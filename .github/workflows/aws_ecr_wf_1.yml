name: AWS DOCKER PUSH
on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
      - name: AWS Actions  
        uses: aws-actions/configure-aws-credentials@v6.1.2
        with:
          aws-region: ${{secrets.AWS_REGION}}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
    
          
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1
        
      - name: Build and push the tagged docker image to Amazon ECR
        id: build-image
        env:
            ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
            ECR_REPOSITORY: ${{secrets.AWS_ECR_REPO}}
            IMAGE_TAG: latest
        run: |
            docker build -t $ECR_REGISTRY/harmeet/order-service-repo:latest .
            docker push $ECR_REGISTRY/harmeet/order-service-repo:latest
            echo "image=$ECR_REGISTRY/harmeet/order-service-repo:latest" >> $GITHUB_OUTPUT
      - name: Download current task definition
        run: |
          aws ecs describe-task-definition --task-definition order-service-family --query taskDefinition > task-definition.json
          echo %taskDefinition%
      - name: Fill in the new image ID in the Amazon ECS task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
         task-definition: order-service-task-definition
         container-name: order-service-container
         image: ${{ steps.build-image.outputs.image }}

      - name: Deploy Amazon ECS task definition
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
         task-definition: ${{ steps.task-def.outputs.task-definition }}
         service: order-service-service01
         cluster: order-service-cluster
         wait-for-service-stability: true       
